{% extends 'base.html' %}
{% load static %}
{% block title %}Login - E-Tech Builders{% endblock %}
{% block content %}
<div class="login-page"
    style="min-height:calc(100vh - 60px); display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#E3F2FD 0%,#BBDEFB 50%,#E3F2FD 100%); margin:-28px -32px; padding:40px 20px;">
    <div class="login-card">
        <div style="text-align:center;margin-bottom:24px;">
            <img src="{% static 'images/logo.png' %}" alt="logo" style="width:64px;height:64px;object-fit:contain;">
            <div style="font-size:20px;font-weight:700;color:#1A73E8;margin-top:10px;">E-Tech Builders</div>
            <div style="font-size:13px;color:#5A6A85;margin-top:4px;">Construction Management Platform</div>
        </div>

        {% if error %}
        <div
            style="background:#FFEBEE; border:1px solid #FFCDD2; color:#C62828; padding:10px 14px; border-radius:8px; font-size:13px; font-weight:500; margin-bottom:16px; display:flex; align-items:center; gap:8px;">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" id="id_username" name="username" required placeholder="Enter your username"
                    autofocus>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" id="id_password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn"
                style="width:100%; margin-top:8px; padding:11px; font-size:15px; font-weight:600;">
                Sign In →
            </button>
        </form>

        <div style="margin-top:20px; padding-top:16px; border-top:1px solid #DDEEFF; text-align:center;">
            <p style="font-size:12px; color:#5A6A85; margin:0;">E-Tech Builders v1.0 — Construction Management</p>
        </div>
    </div>
</div>
{% endblock %}
